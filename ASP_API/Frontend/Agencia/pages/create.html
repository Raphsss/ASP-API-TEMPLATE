<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Agência</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Criar Nova Agência</h1>
        <div class="mb-3">
            <a href="../index.html" class="btn btn-secondary">Voltar ao Início</a>
            <a href="list.html" class="btn btn-primary">Listar Agências</a>
        </div>

        <!-- Formulário para Criar Agência -->
        <div class="card">
            <div class="card-header">
                <h5>Adicionar Nova Agência</h5>
            </div>
            <div class="card-body">
                <form id="agencia-form">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="cidade" class="form-label">Cidade</label>
                        <input type="text" class="form-control" id="cidade" required>
                    </div>
                    <div class="mb-3">
                        <label for="estadoUF" class="form-label">Estado (UF)</label>
                        <input type="text" class="form-control" id="estadoUF" maxlength="2" required>
                    </div>
                    <button type="submit" class="btn btn-success">Criar</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../assets/js/create.js"></script>
</body>
</html>
